<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Looking Glass — BTC Prediction</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;padding:20px;max-width:1000px;margin:0 auto}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:0.8rem}
.nav a{color:#58a6ff;text-decoration:none}
.nav a:hover{text-decoration:underline}
h1{color:#58a6ff;font-size:1.8rem;text-align:center;margin-bottom:4px}
.sub{color:#484f58;font-size:0.8rem;text-align:center;margin-bottom:24px}
.card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:20px;margin-bottom:16px}
.card-title{color:#8b949e;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.prediction-box{text-align:center;padding:20px 0}
.prediction-dir{font-size:2.5rem;font-weight:900}
.prediction-confidence{font-size:1.1rem;color:#8b949e;margin-top:4px}
.score-bar-container{max-width:400px;margin:16px auto;position:relative}
.score-bar-bg{height:8px;background:linear-gradient(to right, #ef4444, #f59e0b, #22c55e);border-radius:4px;position:relative}
.score-bar-marker{position:absolute;top:-4px;width:16px;height:16px;background:#fff;border-radius:50%;transform:translateX(-50%);box-shadow:0 0 8px rgba(255,255,255,0.5)}
.score-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:0.7rem;color:#484f58}
.stats-row{display:flex;justify-content:center;gap:30px;margin-top:16px;flex-wrap:wrap}
.stat{text-align:center}
.stat-val{font-size:1.3rem;font-weight:700;color:#c9d1d9}
.stat-label{font-size:0.7rem;color:#484f58;margin-top:2px}
.liq-row{display:flex;justify-content:center;gap:40px;margin-top:16px;flex-wrap:wrap}
.liq-item{text-align:center;padding:8px 16px;border-radius:8px}
.liq-long{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3)}
.liq-short{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3)}
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;color:#484f58;font-size:0.7rem;text-transform:uppercase;border-bottom:1px solid #21262d}
tr:hover{background:rgba(88,166,255,0.03)}
.chart-container{position:relative;height:200px;overflow:hidden}
canvas{width:100%!important;height:100%!important}
.footer{text-align:center;color:#484f58;font-size:0.65rem;margin-top:20px}
.loading{text-align:center;padding:40px;color:#484f58;font-size:1.1rem}
.loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="nav">
    <a href="cockpit.html">&larr; Cockpit</a>
    <span style="color:#484f58">Looking Glass</span>
    <a href="index.html">Dashboard &rarr;</a>
</div>

<h1>&#x1F52E; Looking Glass</h1>
<div class="sub" id="subtitle">BTC Prediction Engine &middot; Lade Daten...</div>
<div style="text-align:center;margin-bottom:12px"><button id="refreshBtn" onclick="fetchAndRender()" style="padding:6px 20px;background:#161b22;color:#58a6ff;border:1px solid #58a6ff;border-radius:6px;cursor:pointer;font-size:0.8rem">Aktualisieren</button></div>

<div id="content">
    <div class="loading"><span class="spinner"></span> Daten werden geladen...</div>
</div>

<div class="footer">Looking Glass v2.2 &middot; Daten: Binance, Bybit, OKX, Bitget, dYdX, Hyperliquid &middot; Auto-Refresh 60s</div>

<script>
// ── Looking Glass — Client-side Renderer ──────────────────────────────────
const TZ_OFFSET = -4; // UTC-4 Santo Domingo

function toLocal(isoStr) {
    const d = new Date(isoStr);
    const utc = d.getTime() + d.getTimezoneOffset() * 60000;
    return new Date(utc + TZ_OFFSET * 3600000);
}

function fmtTime(isoStr) {
    const d = toLocal(isoStr);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    return dd+'.'+mm+'. '+hh+':'+mi;
}

function fmtDateTime(isoStr) {
    const d = toLocal(isoStr);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yy = d.getFullYear();
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    return dd+'.'+mm+'.'+yy+' '+hh+':'+mi;
}

function fmtPrice(v) {
    return '$' + Math.round(v).toLocaleString();
}

function dirColor(d) {
    return d==='LONG'?'#22c55e':d==='SHORT'?'#ef4444':'#f59e0b';
}
function dirIcon(d) {
    return d==='LONG'?'\u25B2':d==='SHORT'?'\u25BC':'\u25C6';
}
function scoreColor(s) {
    return s>0?'#22c55e':s<0?'#ef4444':'#8b949e';
}

function hCell(v) {
    if (v==='\u2713') return '<td style="padding:4px;text-align:center;color:#22c55e;font-weight:700">\u2713</td>';
    if (v==='\u2717') return '<td style="padding:4px;text-align:center;color:#ef4444;font-weight:700">\u2717</td>';
    if (v==='\u2014'||v==='\u2013') return '<td style="padding:4px;text-align:center;color:#484f58">\u2014</td>';
    return '<td style="padding:4px;text-align:center;color:#484f58;font-size:0.7rem">...</td>';
}

function accBadge(acc, total) {
    const bg = acc>=55?'rgba(34,197,94,0.15)':acc<45?'rgba(239,68,68,0.15)':'rgba(245,158,11,0.15)';
    const c = acc>=55?'#22c55e':acc<45?'#ef4444':'#f59e0b';
    return '<span style="display:inline-block;padding:4px 12px;border-radius:12px;font-weight:700;font-size:0.85rem;background:'+bg+';color:'+c+'">'+Math.round(acc)+'%</span>';
}

// ── Signal label mapping ──────────────────────────────────────────────────
const SIGNAL_LABELS = {
    funding: 'Funding Rate',
    oi_change: 'OI Change',
    ls_ratio: 'Long/Short Ratio',
    top_traders: 'Top Traders L/S',
    taker_ratio: 'Taker Buy/Sell',
    momentum: 'Price Momentum',
    ee_momentum: 'EE Momentum',
    rsi: 'RSI',
    volume: 'Volume Trend',
    bybit_oi_divergence: 'Bybit/Binance OI',
    mempool_activity: 'Mempool Fees',
    options_pcr: 'Options P/C Ratio',
    onchain_tx_volume: 'On-Chain TX Volume',
    onchain_addresses: 'Active Addresses',
    onchain_mempool: 'Mempool Pressure',
    liquidations: 'Liquidations (Live)'
};

const MACRO_SIGNAL_LABELS = {
    daily_ema50: 'Daily EMA 50',
    weekly_ema20: 'Weekly EMA 20',
    daily_ee_momentum: 'Daily EE Momentum',
    daily_rsi: 'Daily RSI 14',
    dcb_detection: 'Dead Cat Bounce',
    volume_comparison: 'Volume Comparison'
};

// ── Render Functions ──────────────────────────────────────────────────────

function renderPrediction(entry, accuracy, totalChecked) {
    const d = entry.direction, s = entry.score, c = entry.confidence;
    const bp = entry.btc_price;
    const scorePct = (s + 100) / 2;
    return '<div class="card"><div class="card-title">Aktuelle Vorhersage</div><div class="prediction-box">' +
        '<div class="prediction-dir" style="color:'+dirColor(d)+'">'+dirIcon(d)+' '+d+'</div>' +
        '<div class="prediction-confidence">'+c+'% Confidence &middot; Score '+(s>=0?'+':'')+s+'/100</div>' +
        '<div class="score-bar-container"><div class="score-bar-bg"><div class="score-bar-marker" style="left:'+scorePct+'%"></div></div>' +
        '<div class="score-labels"><span>SHORT -100</span><span>NEUTRAL</span><span>LONG +100</span></div></div>' +
        '<div class="stats-row"><div class="stat"><div class="stat-val">'+fmtPrice(bp)+'</div><div class="stat-label">BTC Price</div></div>' +
        '<div class="stat"><div class="stat-val">'+accBadge(accuracy, totalChecked)+'</div><div class="stat-label">Accuracy ('+totalChecked+' checked)</div></div></div>' +
        '</div></div>';
}

function renderLiquidation(entry) {
    const lc = entry.liquidation_calc;
    const bp = entry.btc_price;

    // Fallback to old simple display if no calc data
    if (!lc) {
        const ll = entry.long_liq_zone||0, sl = entry.short_liq_zone||0;
        return '<div class="card"><div class="card-title">Geschaetzte Liquidations-Zonen (24h Range)</div><div class="liq-row">' +
            '<div class="liq-item liq-long"><div style="font-size:0.7rem;color:#ef4444">Long Liquidations</div><div style="font-size:1.2rem;font-weight:700;color:#ef4444">'+fmtPrice(ll)+'</div></div>' +
            '<div class="liq-item" style="text-align:center"><div style="font-size:0.7rem;color:#8b949e">Current</div><div style="font-size:1.2rem;font-weight:700;color:#58a6ff">'+fmtPrice(bp)+'</div></div>' +
            '<div class="liq-item liq-short"><div style="font-size:0.7rem;color:#22c55e">Short Liquidations</div><div style="font-size:1.2rem;font-weight:700;color:#22c55e">'+fmtPrice(sl)+'</div></div>' +
            '</div></div>';
    }

    const nl = lc.nearest_long_liq || {};
    const ns = lc.nearest_short_liq || {};
    const magTarget = lc.magnetic_target || 'N/A';
    const magColor = magTarget === 'LONG_LIQS' ? '#ef4444' : '#22c55e';
    const magLabel = magTarget === 'LONG_LIQS' ? 'LONG LIQS (bearish magnet)' : 'SHORT LIQS (bullish magnet)';

    let html = '<div class="card"><div class="card-title">Liquidation Level Calculator (OI-based)</div>';

    // Top row: OI + L/S split
    html += '<div style="display:flex;justify-content:center;gap:20px;margin-bottom:8px;flex-wrap:wrap">' +
        '<div style="text-align:center"><div style="font-size:0.65rem;color:#484f58">Total Open Interest</div><div style="font-size:1rem;font-weight:700;color:#c9d1d9">'+(lc.total_oi_fmt||'N/A')+'</div></div>' +
        '<div style="text-align:center"><div style="font-size:0.65rem;color:#484f58">Long / Short</div><div style="font-size:1rem;font-weight:700"><span style="color:#22c55e">'+(lc.long_pct||50).toFixed(0)+'%</span> / <span style="color:#ef4444">'+(lc.short_pct||50).toFixed(0)+'%</span></div></div>' +
        '</div>';

    // Exchange OI breakdown
    const exch = lc.exchanges || {};
    const exchOrder = ['binance','bybit','okx','bitget','dydx','hyperliquid'];
    const exchNames = {binance:'Binance',bybit:'Bybit',okx:'OKX',bitget:'Bitget',dydx:'dYdX',hyperliquid:'Hyperliquid'};
    const exchParts = [];
    for (const k of exchOrder) {
        if (exch[k]) exchParts.push(exchNames[k]+' '+(exch[k].oi_fmt||'?'));
    }
    if (exchParts.length > 0) {
        html += '<div style="text-align:center;margin-bottom:12px;font-size:0.65rem;color:#484f58">'+exchParts.join(' | ')+'</div>';
    }

    // Nearest clusters + current price
    html += '<div class="liq-row">' +
        '<div class="liq-item liq-long"><div style="font-size:0.65rem;color:#ef4444">Nearest Long Liq</div>' +
        '<div style="font-size:1.3rem;font-weight:700;color:#ef4444">'+fmtPrice(nl.price||0)+'</div>' +
        '<div style="font-size:0.7rem;color:#8b949e">'+(nl.volume||'N/A')+' &middot; '+(nl.distance_pct||0).toFixed(1)+'%</div></div>' +
        '<div class="liq-item" style="text-align:center;padding:8px 20px"><div style="font-size:0.65rem;color:#8b949e">BTC Price</div>' +
        '<div style="font-size:1.3rem;font-weight:700;color:#58a6ff">'+fmtPrice(bp)+'</div></div>' +
        '<div class="liq-item liq-short"><div style="font-size:0.65rem;color:#22c55e">Nearest Short Liq</div>' +
        '<div style="font-size:1.3rem;font-weight:700;color:#22c55e">'+fmtPrice(ns.price||0)+'</div>' +
        '<div style="font-size:0.7rem;color:#8b949e">'+(ns.volume||'N/A')+' &middot; +'+(ns.distance_pct||0).toFixed(1)+'%</div></div>' +
        '</div>';

    // Magnetic Target
    html += '<div style="text-align:center;margin:14px 0 10px"><div style="font-size:0.65rem;color:#484f58;margin-bottom:2px">Magnetic Target (MM likely push)</div>' +
        '<div style="display:inline-block;padding:4px 16px;border-radius:8px;font-weight:700;font-size:0.9rem;background:rgba(88,166,255,0.08);border:1px solid '+magColor+';color:'+magColor+'">'+magLabel+'</div>' +
        '<div style="font-size:0.65rem;color:#484f58;margin-top:4px">Long Vol: '+(lc.near_long_vol_fmt||'N/A')+' | Short Vol: '+(lc.near_short_vol_fmt||'N/A')+'</div></div>';

    // Tables: top 5 levels each side
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px">';

    // Long liq table
    html += '<div><div style="font-size:0.65rem;color:#ef4444;text-transform:uppercase;margin-bottom:4px;letter-spacing:1px">Long Liquidation Levels</div><table>' +
        '<tr><th style="font-size:0.6rem">Price</th><th style="font-size:0.6rem;text-align:right">Volume</th><th style="font-size:0.6rem;text-align:right">Leverage</th></tr>';
    const ll = lc.long_liq_levels || [];
    for (let i = 0; i < Math.min(5, ll.length); i++) {
        html += '<tr><td style="padding:3px 6px;color:#ef4444;font-size:0.8rem">'+fmtPrice(ll[i].price)+'</td>' +
            '<td style="padding:3px 6px;text-align:right;color:#8b949e;font-size:0.75rem">'+ll[i].volume_fmt+'</td>' +
            '<td style="padding:3px 6px;text-align:right;color:#484f58;font-size:0.7rem">'+ll[i].leverage+'</td></tr>';
    }
    html += '</table></div>';

    // Short liq table
    html += '<div><div style="font-size:0.65rem;color:#22c55e;text-transform:uppercase;margin-bottom:4px;letter-spacing:1px">Short Liquidation Levels</div><table>' +
        '<tr><th style="font-size:0.6rem">Price</th><th style="font-size:0.6rem;text-align:right">Volume</th><th style="font-size:0.6rem;text-align:right">Leverage</th></tr>';
    const sl = lc.short_liq_levels || [];
    for (let i = 0; i < Math.min(5, sl.length); i++) {
        html += '<tr><td style="padding:3px 6px;color:#22c55e;font-size:0.8rem">'+fmtPrice(sl[i].price)+'</td>' +
            '<td style="padding:3px 6px;text-align:right;color:#8b949e;font-size:0.75rem">'+sl[i].volume_fmt+'</td>' +
            '<td style="padding:3px 6px;text-align:right;color:#484f58;font-size:0.7rem">'+sl[i].leverage+'</td></tr>';
    }
    html += '</table></div></div>';

    html += '</div>';
    return html;
}

function renderSignalTable(signals, score, direction) {
    let rows = '';
    const order = ['funding','oi_change','ls_ratio','top_traders','taker_ratio','momentum','ee_momentum','rsi','volume','bybit_oi_divergence','mempool_activity','options_pcr','onchain_tx_volume','onchain_addresses','onchain_mempool','liquidations'];
    for (const key of order) {
        if (!signals[key]) continue;
        const sig = signals[key];
        const s = sig.score;
        const sc = scoreColor(s);
        const label = SIGNAL_LABELS[key]||key;
        rows += '<tr><td style="padding:8px 12px;color:#c9d1d9">'+label+'</td>' +
            '<td style="padding:8px 12px;color:#8b949e;font-size:0.8rem">'+sig.label+'</td>' +
            '<td style="padding:8px 12px;text-align:right;font-weight:700;color:'+sc+'">'+(s>=0?'+':'')+s+'</td></tr>';
    }
    return '<div class="card"><div class="card-title">Signal Breakdown</div><table>' +
        '<tr><th>Signal</th><th>Wert</th><th style="text-align:right">Score</th></tr>' +
        rows +
        '<tr style="border-top:2px solid #58a6ff"><td style="padding:10px 12px;color:#58a6ff;font-weight:700" colspan="2">Total Score</td>' +
        '<td style="padding:10px 12px;text-align:right;font-weight:900;color:'+dirColor(direction)+';font-size:1.1rem">'+(score>=0?'+':'')+score+'</td></tr>' +
        '</table></div>';
}

function renderHistory(data) {
    const slice = data.slice(-192);
    let rows = '';
    let runCorrect = 0, runTotal = 0;
    for (let i = slice.length - 1; i >= 0; i--) {
        const e = slice[i];
        const r = e.result || 'pending';
        if (r === 'correct') { runCorrect++; runTotal++; }
        else if (r === 'wrong') { runTotal++; }
        const runAcc = runTotal > 0 ? Math.round(runCorrect/runTotal*100)+'%' : '\u2013';
        const dc = dirColor(e.direction||'NEUTRAL');
        rows += '<tr style="border-bottom:1px solid #21262d">' +
            '<td style="padding:6px 10px;color:#8b949e;font-size:0.8rem">'+fmtTime(e.timestamp)+'</td>' +
            '<td style="padding:6px 10px;text-align:right">'+fmtPrice(e.btc_price)+'</td>' +
            '<td style="padding:6px 10px;text-align:center;color:'+dc+';font-weight:700">'+(e.direction||'?')+'</td>' +
            '<td style="padding:6px 10px;text-align:center">'+(e.score>=0?'+':'')+e.score+'</td>' +
            hCell(e.r1h||'') + hCell(e.r3h||'') + hCell(e.r6h||'') + hCell(e.r8h||'') + hCell(e.r12h||'') +
            '<td style="padding:4px;text-align:center;font-weight:900;font-size:0.85rem;color:'+(r==='correct'?'#22c55e':r==='wrong'?'#ef4444':'#484f58')+'">'+(r==='correct'?'✓':r==='wrong'?'✗':'—')+'</td>' +
            '<td style="padding:4px;text-align:center;color:#8b949e;font-weight:700;font-size:0.8rem">'+runAcc+'</td></tr>';
    }
    return '<div class="card"><div class="card-title">Vorhersage-Verlauf</div><div style="overflow-x:auto"><table>' +
        '<tr><th>Zeit</th><th style="text-align:right">Preis</th><th style="text-align:center">Signal</th><th style="text-align:center">Score</th>' +
        '<th style="text-align:center;font-size:0.65rem">1h</th><th style="text-align:center;font-size:0.65rem">3h</th>' +
        '<th style="text-align:center;font-size:0.65rem">6h</th><th style="text-align:center;font-size:0.65rem">8h</th>' +
        '<th style="text-align:center;font-size:0.65rem">12h</th><th style="text-align:center">Erg</th><th style="text-align:center">Acc</th></tr>' +
        rows + '</table></div></div>';
}

function renderChart(data) {
    // Return the card HTML — actual drawing happens after DOM insert
    return '<div class="card"><div class="card-title">Score &amp; Preis (letzte 72h)</div>' +
        '<div class="chart-container"><canvas id="chartCanvas"></canvas></div></div>';
}

function drawChart(data) {
    const slice = data.slice(-192);
    const labels = [], scores = [], prices = [];
    for (const e of slice) {
        labels.push(fmtTime(e.timestamp));
        scores.push(e.score);
        prices.push(e.btc_price);
    }
    const canvas = document.getElementById('chartCanvas');
    if (!canvas || scores.length < 2) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.parentElement.offsetWidth;
    const H = 200;
    canvas.width = W; canvas.height = H;
    const pad = {t:20,r:60,b:25,l:40};
    const cw = W-pad.l-pad.r, ch = H-pad.t-pad.b;
    const n = scores.length;
    function sy(v) { return pad.t + ch - ((v+100)/200)*ch; }
    const pMin = Math.min(...prices)*0.999, pMax = Math.max(...prices)*1.001;
    function py(v) { return pad.t + ch - ((v-pMin)/(pMax-pMin))*ch; }
    function sx(i) { return pad.l + (i/(n-1))*cw; }
    // Grid
    ctx.strokeStyle = '#21262d'; ctx.lineWidth = 1;
    for (let v of [-50,0,50]) {
        ctx.beginPath(); ctx.moveTo(pad.l, sy(v)); ctx.lineTo(W-pad.r, sy(v)); ctx.stroke();
    }
    // Zero line
    ctx.strokeStyle = '#484f58'; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(pad.l, sy(0)); ctx.lineTo(W-pad.r, sy(0)); ctx.stroke();
    ctx.setLineDash([]);
    // Score fill
    for (let i=0;i<n-1;i++) {
        ctx.beginPath();
        ctx.moveTo(sx(i), sy(0));
        ctx.lineTo(sx(i), sy(scores[i]));
        ctx.lineTo(sx(i+1), sy(scores[i+1]));
        ctx.lineTo(sx(i+1), sy(0));
        ctx.closePath();
        const avg = (scores[i]+scores[i+1])/2;
        ctx.fillStyle = avg>=0 ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)';
        ctx.fill();
    }
    // Score line
    for (let i=0;i<n-1;i++) {
        ctx.beginPath();
        ctx.moveTo(sx(i), sy(scores[i]));
        ctx.lineTo(sx(i+1), sy(scores[i+1]));
        const avg = (scores[i]+scores[i+1])/2;
        ctx.strokeStyle = avg>=0 ? '#22c55e' : '#ef4444';
        ctx.lineWidth = 2; ctx.stroke();
    }
    // Price line
    ctx.beginPath();
    for (let i=0;i<n;i++) { i===0?ctx.moveTo(sx(i),py(prices[i])):ctx.lineTo(sx(i),py(prices[i])); }
    ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1; ctx.stroke();
    // Labels
    ctx.fillStyle = '#484f58'; ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('+100', pad.l-4, sy(100)+4);
    ctx.fillText('0', pad.l-4, sy(0)+4);
    ctx.fillText('-100', pad.l-4, sy(-100)+4);
    ctx.textAlign = 'left';
    ctx.fillStyle = '#58a6ff';
    ctx.fillText('$'+Math.round(pMax).toLocaleString(), W-pad.r+4, py(pMax)+4);
    ctx.fillText('$'+Math.round(pMin).toLocaleString(), W-pad.r+4, py(pMin)+4);
    // X labels
    ctx.fillStyle = '#484f58'; ctx.textAlign = 'center';
    const step = Math.max(1, Math.floor(n/6));
    for (let i=0;i<n;i+=step) {
        ctx.fillText(labels[i], sx(i), H-4);
    }
    // Tooltip
    const tooltip = document.createElement('div');
    tooltip.style.cssText = 'position:absolute;background:#161b22;border:1px solid #58a6ff;border-radius:6px;padding:4px 8px;font-size:0.72rem;color:#c9d1d9;pointer-events:none;display:none;z-index:10;white-space:nowrap';
    canvas.parentElement.style.position='relative';
    canvas.parentElement.appendChild(tooltip);
    canvas.addEventListener('mousemove', function(e) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const idx = Math.round((mx - pad.l) / cw * (n-1));
        if (idx >= 0 && idx < n) {
            tooltip.style.display = 'block';
            tooltip.innerHTML = '<div style="color:#fff;font-size:0.55rem;margin-bottom:2px">'+labels[idx]+'</div><span style="color:#58a6ff">$'+prices[idx].toLocaleString()+'</span> &middot; <span style="color:'+(scores[idx]>=0?'#22c55e':'#ef4444')+'">Score '+scores[idx]+'</span>';
            const tx = Math.min(mx + 10, W - 140);
            tooltip.style.left = tx + 'px';
            tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
        }
    });
    canvas.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });
}

// ── Macro Section ─────────────────────────────────────────────────────────

function renderMacro(data) {
    // Find last entry with macro_score
    let macroEntry = null;
    for (let i = data.length - 1; i >= 0; i--) {
        if (data[i].macro_score !== undefined && data[i].macro_score !== null) {
            macroEntry = data[i];
            break;
        }
    }
    if (!macroEntry) return '';

    const ms = macroEntry.macro_score;
    const md = macroEntry.macro_direction || 'NEUTRAL';
    const mSigs = macroEntry.macro_signals || {};
    const mc = dirColor(md);
    const mi = dirIcon(md);
    const mPct = (ms + 100) / 2;

    // Key levels
    const ema50 = mSigs.daily_ema50 || {};
    const ema20w = mSigs.weekly_ema20 || {};
    const rsiSig = mSigs.daily_rsi || {};
    const dcbSig = mSigs.dcb_detection || {};

    const ema50Label = ema50.label || 'N/A';
    const ema50Above = ema50Label.includes('ABOVE');
    const ema50DistMatch = ema50Label.match(/([\+\-]?\d+\.?\d*)%/);
    const ema50Dist = ema50DistMatch ? ema50DistMatch[1] : '0';
    const ema50ValMatch = ema50Label.match(/\$[\d,]+/);
    const ema50Val = ema50ValMatch ? ema50ValMatch[0] : 'N/A';

    const ema20wLabel = ema20w.label || 'N/A';
    const ema20wAbove = ema20wLabel.includes('ABOVE');
    const ema20wDistMatch = ema20wLabel.match(/([\+\-]?\d+\.?\d*)%/);
    const ema20wDist = ema20wDistMatch ? ema20wDistMatch[1] : '0';
    const ema20wValMatch = ema20wLabel.match(/\$[\d,]+/);
    const ema20wVal = ema20wValMatch ? ema20wValMatch[0] : 'N/A';

    const rsiVal = rsiSig.label || 'N/A';
    const rsiNum = parseFloat(rsiVal) || 50;
    const rsiColor = rsiNum > 55 ? '#22c55e' : rsiNum < 45 ? '#ef4444' : '#f59e0b';

    const dcbLabel = dcbSig.label || 'N/A';
    const dcbLikely = dcbLabel.startsWith('LIKELY');
    const dcbColor = dcbLikely ? '#ef4444' : '#22c55e';
    const dcbText = dcbLikely ? 'LIKELY' : 'UNLIKELY';

    // Signal breakdown rows
    let macroRows = '';
    const macroOrder = ['daily_ema50','weekly_ema20','daily_ee_momentum','daily_rsi','dcb_detection','volume_comparison'];
    for (const key of macroOrder) {
        if (!mSigs[key]) continue;
        const sig = mSigs[key];
        const s = sig.score || 0;
        const sc = scoreColor(s);
        const label = MACRO_SIGNAL_LABELS[key] || key;
        macroRows += '<tr><td style="padding:8px 12px;color:#c9d1d9">'+label+'</td>' +
            '<td style="padding:8px 12px;color:#8b949e;font-size:0.8rem">'+(sig.label||'N/A')+'</td>' +
            '<td style="padding:8px 12px;text-align:right;font-weight:700;color:'+sc+'">'+(s>=0?'+':'')+s+'</td></tr>';
    }

    let html = '<div style="margin-top:40px;border-top:2px solid #58a6ff;padding-top:8px">' +
        '<h2 style="color:#58a6ff;text-align:center;font-size:1.5rem;margin-bottom:4px">LOOKING GLASS V2 &mdash; MAKRO ANALYSE</h2>' +
        '<div style="color:#484f58;font-size:0.75rem;text-align:center;margin-bottom:20px">Daily &amp; Weekly Timeframe &middot; Structural Bias</div></div>';

    // Macro prediction
    html += '<div class="card"><div class="card-title">Makro Richtung</div><div class="prediction-box">' +
        '<div class="prediction-dir" style="color:'+mc+'">'+mi+' '+md+'</div>' +
        '<div class="prediction-confidence">Macro Score '+(ms>=0?'+':'')+ms+'/100</div>' +
        '<div class="score-bar-container"><div class="score-bar-bg"><div class="score-bar-marker" style="left:'+mPct+'%"></div></div>' +
        '<div class="score-labels"><span>SHORT -100</span><span>NEUTRAL</span><span>LONG +100</span></div></div></div></div>';

    // Key Macro Levels
    html += '<div class="card"><div class="card-title">Makro Key Levels</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:8px 0">' +
        '<div style="background:#21262d;border-radius:8px;padding:12px;text-align:center">' +
        '<div style="font-size:0.7rem;color:#8b949e;margin-bottom:4px">Daily EMA 50</div>' +
        '<div style="font-size:1.3rem;font-weight:700;color:'+(ema50Above?'#22c55e':'#ef4444')+'">'+ema50Val+'</div>' +
        '<div style="font-size:0.7rem;color:#484f58;margin-top:2px">'+(ema50Above?'ABOVE':'BELOW')+' ('+ema50Dist+'%)</div></div>' +
        '<div style="background:#21262d;border-radius:8px;padding:12px;text-align:center">' +
        '<div style="font-size:0.7rem;color:#8b949e;margin-bottom:4px">Weekly EMA 20</div>' +
        '<div style="font-size:1.3rem;font-weight:700;color:'+(ema20wAbove?'#22c55e':'#ef4444')+'">'+ema20wVal+'</div>' +
        '<div style="font-size:0.7rem;color:#484f58;margin-top:2px">'+(ema20wAbove?'ABOVE':'BELOW')+' ('+ema20wDist+'%)</div></div>' +
        '<div style="background:#21262d;border-radius:8px;padding:12px;text-align:center">' +
        '<div style="font-size:0.7rem;color:#8b949e;margin-bottom:4px">Daily RSI 14</div>' +
        '<div style="font-size:1.3rem;font-weight:700;color:'+rsiColor+'">'+rsiVal+'</div></div>' +
        '<div style="background:#21262d;border-radius:8px;padding:12px;text-align:center">' +
        '<div style="font-size:0.7rem;color:#8b949e;margin-bottom:4px">Dead Cat Bounce</div>' +
        '<div style="font-size:1.3rem;font-weight:700;color:'+dcbColor+'">'+dcbText+'</div>' +
        '<div style="font-size:0.65rem;color:#484f58;margin-top:2px">'+dcbLabel+'</div></div></div></div>';

    // Macro Signal Breakdown
    html += '<div class="card"><div class="card-title">Makro Signal Breakdown</div><table>' +
        '<tr><th>Signal</th><th>Wert</th><th style="text-align:right">Score</th></tr>' +
        macroRows +
        '<tr style="border-top:2px solid #58a6ff"><td style="padding:10px 12px;color:#58a6ff;font-weight:700" colspan="2">Macro Total Score</td>' +
        '<td style="padding:10px 12px;text-align:right;font-weight:900;color:'+mc+';font-size:1.1rem">'+(ms>=0?'+':'')+ms+'</td></tr></table></div>';

    // Macro History
    const macroEntries = data.filter(e => e.macro_score !== undefined && e.macro_score !== null).slice(-48);
    if (macroEntries.length > 0) {
        let mRows = '';
        let mRunCorrect = 0, mRunTotal = 0;
        for (let i = macroEntries.length - 1; i >= 0; i--) {
            const e = macroEntries[i];
            const mdr = e.m3d || '';
            if (mdr === '\u2713') { mRunCorrect++; mRunTotal++; }
            else if (mdr === '\u2717') { mRunTotal++; }
            const mAcc = mRunTotal > 0 ? Math.round(mRunCorrect/mRunTotal*100)+'%' : '\u2013';
            const mdc = dirColor(e.macro_direction||'NEUTRAL');
            mRows += '<tr style="border-bottom:1px solid #21262d">' +
                '<td style="padding:4px 8px;color:#8b949e;font-size:0.75rem">'+fmtTime(e.timestamp)+'</td>' +
                '<td style="padding:4px 8px;text-align:right;font-size:0.8rem">'+fmtPrice(e.btc_price)+'</td>' +
                '<td style="padding:4px 8px;text-align:center;color:'+mdc+';font-weight:700;font-size:0.8rem">'+(e.macro_direction||'?')+'</td>' +
                '<td style="padding:4px 8px;text-align:center;font-size:0.8rem">'+(e.macro_score>=0?'+':'')+e.macro_score+'</td>' +
                hCell(e.m1d||'') + hCell(e.m3d||'') + hCell(e.m5d||'') + hCell(e.m1w||'') +
                '<td style="padding:3px 6px;text-align:center;color:#8b949e;font-size:0.75rem">'+mAcc+'</td></tr>';
        }
        html += '<div class="card"><div class="card-title">Makro Verlauf</div><div style="overflow-x:auto"><table>' +
            '<tr><th>Zeit</th><th style="text-align:right">Preis</th><th style="text-align:center">Signal</th><th style="text-align:center">Score</th>' +
            '<th style="text-align:center;font-size:0.65rem">1D</th><th style="text-align:center;font-size:0.65rem">3D</th>' +
            '<th style="text-align:center;font-size:0.65rem">5D</th><th style="text-align:center;font-size:0.65rem">1W</th>' +
            '<th style="text-align:center">Acc</th></tr>' +
            mRows + '</table></div></div>';
    }

    return html;
}

// ── Main fetch & render ───────────────────────────────────────────────────

async function fetchAndRender() {
    const btn = document.getElementById('refreshBtn');
    btn.textContent = 'Lade...';
    btn.disabled = true;
    try {
        const resp = await fetch('looking_glass_data.json?v=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data || data.length === 0) {
            document.getElementById('content').innerHTML = '<div class="loading">Keine Daten vorhanden.</div>';
            return;
        }

        const last = data[data.length - 1];

        // Calculate accuracy
        const results = data.filter(e => e.result === 'correct' || e.result === 'wrong');
        const correct = results.filter(e => e.result === 'correct').length;
        const totalChecked = results.length;
        const accuracy = totalChecked > 0 ? (correct / totalChecked * 100) : 0;

        // Update subtitle
        document.getElementById('subtitle').innerHTML = 'BTC Prediction Engine &middot; Updated ' + fmtDateTime(last.timestamp) + ' (UTC-4)';

        // Build all sections
        let html = '';
        html += renderPrediction(last, accuracy, totalChecked);
        html += renderLiquidation(last);
        html += renderChart(data);
        html += renderSignalTable(last.signals || {}, last.score, last.direction);
        html += renderHistory(data);
        html += renderMacro(data);

        document.getElementById('content').innerHTML = html;

        // Draw canvas chart after DOM update
        requestAnimationFrame(function() { drawChart(data); });
    } catch(err) {
        document.getElementById('content').innerHTML = '<div class="loading" style="color:#ef4444">Fehler beim Laden: ' + err.message + '</div>';
        console.error('Looking Glass fetch error:', err);
    } finally {
        btn.textContent = 'Aktualisieren';
        btn.disabled = false;
    }
}

// Initial load
fetchAndRender();

// Auto-refresh every 60 seconds
setInterval(fetchAndRender, 60000);
</script>
