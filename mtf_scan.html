<style>

<body>
<h1>MTF Scan</h1>
<div style="display:flex;justify-content:space-between;align-items:center;padding:0 10px;margin-bottom:10px;"><a href="cockpit.html" style="color:#4a7a9b;text-decoration:none;font-size:0.8rem;padding:4px 12px;border:1px solid #21262d;border-radius:4px;">&larr; Cockpit</a><a href="index.html" style="color:#58a6ff;text-decoration:none;font-size:0.8rem;padding:4px 12px;border:1px solid #21262d;border-radius:4px;">Dashboard</a><a href="kalender.html" style="color:#4a7a9b;text-decoration:none;font-size:0.8rem;padding:4px 12px;border:1px solid #21262d;border-radius:4px;">Kalender &rarr;</a></div>

<div class="refresh-bar">
<button class="refresh-btn" id="refreshBtn" onclick="fetchAndRender()">Aktualisieren</button>
<span class="refresh-ts" id="refreshTs">Lade...</span>
</div>

<div class="updated">3x taeglich: EU (06:00) &middot; US (09:30) &middot; Asia (20:00)</div>

<div class="scan-block" style="padding:12px 20px;">
<div style="color:#58a6ff;font-size:0.9rem;margin-bottom:6px;">Fear &amp; Greed Index (30 Tage)</div>
<div style="height:140px;"><canvas id="fngChart"></canvas></div>
</div>

<div class="legend">
    <span><b style="color:#22c55e;">L</b> = Long</span>
    <span><b style="color:#ef4444;">S</b> = Short</span>
    <span><b style="color:#8b949e;">&mdash;</b> = Neutral</span>
    <span><span style="color:#22c55e;">&uarr;</span> = EE Cross Long</span>
    <span><span style="color:#ef4444;">&darr;</span> = EE Cross Short</span>
    <span><span style="color:#22c55e;font-size:0.8rem;">OS</span> = RSI Oversold (&lt;30)</span>
    <span><span style="color:#ef4444;font-size:0.8rem;">OB</span> = RSI Overbought (&gt;70)</span>
</div>

<div style="margin-bottom:15px;">
<input type="text" id="coinSearch" placeholder="Coin suchen..." style="width:100%;max-width:300px;padding:8px 12px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:0.9rem;" oninput="filterCoins(this.value)">
</div>

<div id="coinSections"><div style="text-align:center;color:#484f58;padding:40px;">Lade Scan-Daten...</div></div>

<div id="oldSessionView"></div>

<div class="footer"><a href="kapitalfluss.html">&larr; Kapitalfluss</a> &middot; <a href="index.html">&larr; Dashboard</a></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
// === MTF SCAN — Dynamic Data Loading ===
var scanData = [];
var fngChart = null;
var tfs = ['2m','5m','15m','30m','1h','4h'];
var sessions = ['EU','US','ASIA'];

// --- Fear & Greed Chart ---
function loadFearGreed() {
    fetch('https://api.alternative.me/fng/?limit=30')
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (!d || !d.data) return;
            var entries = d.data.reverse();
            var dates = entries.map(function(e) {
                var dt = new Date(parseInt(e.timestamp) * 1000);
                return String(dt.getMonth()+1).padStart(2,'0') + '/' + String(dt.getDate()).padStart(2,'0');
            });
            var vals = entries.map(function(e) { return parseInt(e.value); });
            renderFngChart(dates, vals);
        })
        .catch(function() {});
}

function renderFngChart(dates, vals) {
    var ctx = document.getElementById('fngChart');
    if (!ctx) return;
    if (fngChart) fngChart.destroy();
    fngChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dates,
            datasets: [{
                data: vals,
                borderWidth: 2,
                pointRadius: 4,
                pointHitRadius: 20,
                tension: 0.3,
                fill: true,
                segment: {
                    borderColor: function(ctx) { var y=ctx.p1.parsed.y; return y<=25?'#ef4444':y<=45?'#ff9800':y<=55?'#ffc107':y<=75?'#8bc34a':'#22c55e'; },
                    backgroundColor: function(ctx) { var y=ctx.p1.parsed.y; return y<=25?'rgba(239,68,68,0.15)':y<=45?'rgba(255,152,0,0.1)':y<=55?'rgba(255,193,7,0.1)':y<=75?'rgba(139,195,74,0.1)':'rgba(34,197,94,0.15)'; }
                },
                borderColor: '#ff9800',
                backgroundColor: 'rgba(255,152,0,0.1)'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'nearest', intersect: false },
            onClick: function() { this.tooltip.opacity = 0; this.update(); },
            plugins: { legend: { display: false }, tooltip: { enabled: true, intersect: false, callbacks: { label: function(c) {
                var v = c.parsed.y;
                var l = v<=25?'Extreme Fear':v<=45?'Fear':v<=55?'Neutral':v<=75?'Greed':'Extreme Greed';
                return v + ' — ' + l;
            }}}},
            scales: {
                x: { ticks: { color: '#484f58', font: { size: 9 }, maxRotation: 0 }},
                y: { min: 0, max: 100, ticks: { color: '#8b949e', font: { size: 9 }, stepSize: 25 },
                     grid: { color: function(c) { return c.tick.value===25?'rgba(239,68,68,0.2)':c.tick.value===75?'rgba(34,197,94,0.2)':'rgba(50,50,50,0.3)'; }}}
            }
        }
    });
}

// --- Heatmap Rendering ---
function dc(d) { return d==='LONG'?'#1a3d1a':d==='SHORT'?'#3d1a1a':'#1a1a1a'; }
function tc(d) { return d==='LONG'?'#22c55e':d==='SHORT'?'#ef4444':'#555'; }
function dl(d) { return d==='LONG'?'L':d==='SHORT'?'S':'\u00b7'; }

function getTfData(cd, tf) {
    if (cd[tf]) return cd[tf];
    return null;
}

function getBtcRow() {
    return '<div class="btc-live-row"></div>';
}

function buildCoinSection(coin) {
    var h = '<div class="coin-section" id="coin-'+coin+'" data-coin="'+coin+'">';
    h += '<div class="coin-name">'+coin+'</div>';
    if (coin !== 'BTC') { h += getBtcRow(); }

    sessions.forEach(function(sess) {
        var sessScans = scanData.filter(function(s) { return s.session===sess && (s.coins||{})[coin]; });
        sessScans = sessScans.slice().reverse();
        if (!sessScans.length) return;

        var sessColor = sess==='EU'?'#2196F3':sess==='US'?'#ff9800':'#9c27b0';
        h += '<div class="sess-label" style="color:'+sessColor+';">'+sess+'</div>';
        h += '<table class="coin-hm"><tr><th></th>';
        tfs.forEach(function(tf) { h += '<th>'+tf+'</th>'; });
        h += '</tr>';

        sessScans.forEach(function(s) {
            var time = s.timestamp.split(' ')[1] || '';
            var date = s.timestamp.split(' ')[0].slice(5);
            h += '<tr><td class="tf-label">'+date+' '+time+'</td>';
            tfs.forEach(function(tf) {
                var cd = (s.coins||{})[coin] || {};
                var tfData = cd[tf] || getTfData(cd, tf);
                var d = tfData ? tfData.dir||'NEUTRAL' : 'NEUTRAL';
                h += '<td style="background:'+dc(d)+';color:'+tc(d)+';text-align:center;font-weight:700;">'+dl(d)+'</td>';
            });
            h += '</tr>';
        });
        h += '</table>';
    });

    h += '<hr class="coin-divider"></div>';
    return h;
}

function buildOldSessionView() {
    var scans = scanData.slice(-21).reverse();
    if (!scans.length) return '';
    var h = '<details style="margin-top:20px;"><summary style="color:#484f58;cursor:pointer;font-size:0.8rem;">Alte Session-Ansicht (zum Aufklappen)</summary>';

    scans.forEach(function(scan) {
        var ts = scan.timestamp;
        var session = scan.session;
        var btc = scan.btc_price || 0;
        var coins = scan.coins || {};
        var sessColor = session==='EU'?'#2196F3':session==='US'?'#ff9800':session==='ASIA'?'#9c27b0':'#8b949e';

        var rows = '';
        var coinOrder = Object.keys(coins).sort();
        coinOrder.forEach(function(coin) {
            var cells = '';
            tfs.forEach(function(tf) {
                var d = (coins[coin]||{})[tf] || {};
                var dir = d.dir || '?';
                var eeCross = d.ee_cross || '';
                var rsi = d.rsi || 50;
                var bg, txt, label;
                if (dir==='LONG') { bg='rgba(34,197,94,0.25)'; txt='#22c55e'; label='L'; }
                else if (dir==='SHORT') { bg='rgba(239,68,68,0.25)'; txt='#ef4444'; label='S'; }
                else { bg='rgba(100,100,100,0.15)'; txt='#8b949e'; label='\u2014'; }

                var crossMarker = '';
                if (eeCross==='LONG') crossMarker=' <span style="color:#22c55e;font-size:0.7rem;">\u2B06</span>';
                else if (eeCross==='SHORT') crossMarker=' <span style="color:#ef4444;font-size:0.7rem;">\u2B07</span>';

                var rsiWarn = '';
                if (rsi < 30) rsiWarn = ' <span style="font-size:0.6rem;color:#22c55e;">OS</span>';
                else if (rsi > 70) rsiWarn = ' <span style="font-size:0.6rem;color:#ef4444;">OB</span>';

                cells += '<td style="background:'+bg+';color:'+txt+';text-align:center;font-weight:700;padding:6px;">'+label+crossMarker+rsiWarn+'</td>';
            });

            // Overall
            var dirs = tfs.map(function(tf) { return ((coins[coin]||{})[tf]||{}).dir || 'NEUTRAL'; });
            var longs = dirs.filter(function(x){return x==='LONG';}).length;
            var shorts = dirs.filter(function(x){return x==='SHORT';}).length;
            var overall;
            if (longs >= 3) overall = '<span style="color:#22c55e;font-weight:700;">LONG</span>';
            else if (shorts >= 3) overall = '<span style="color:#ef4444;font-weight:700;">SHORT</span>';
            else if (longs > shorts) overall = '<span style="color:#22c55e;">long</span>';
            else if (shorts > longs) overall = '<span style="color:#ef4444;">short</span>';
            else overall = '<span style="color:#8b949e;">\u2014</span>';

            rows += '<tr><td style="font-weight:600;padding:6px;">'+coin+'</td>'+cells+'<td style="text-align:center;padding:6px;">'+overall+'</td></tr>';
        });

        var analysis = scan.analysis || '';
        var analysisBlock = analysis ? '<div class="scan-analysis">'+analysis+'</div>' : '';

        h += '<div class="scan-block"><div class="scan-header">'
           + '<span class="scan-session" style="color:'+sessColor+';">'+session+'</span>'
           + '<span class="scan-time">'+ts+'</span>'
           + '<span class="scan-btc">BTC $'+btc.toLocaleString('en-US',{maximumFractionDigits:0})+'</span>'
           + '</div>'
           + '<table class="heatmap"><tr><th>Coin</th><th>15m</th><th>30m</th><th>1H</th><th>4H</th><th>Overall</th></tr>'
           + rows + '</table>' + analysisBlock + '</div>'
           + '<hr style="border:none;border-top:1px solid #21262d;margin:4px 0 12px;">';
    });

    h += '</details>';
    return h;
}

function renderAll() {
    // Build coin sections
    var allCoins = new Set();
    scanData.forEach(function(s) { Object.keys(s.coins||{}).forEach(function(c) { allCoins.add(c); }); });
    var coins = Array.from(allCoins).sort();

    var html = '';
    coins.forEach(function(c) { html += buildCoinSection(c); });
    document.getElementById('coinSections').innerHTML = html;

    // Old session view
    document.getElementById('oldSessionView').innerHTML = buildOldSessionView();

    // Update timestamp from newest scan entry
    if (scanData.length > 0) {
        var newest = scanData[scanData.length - 1].timestamp;
        // Format: "2026-05-27 10:47" -> "27.05. 10:47"
        var parts = newest.split(' ');
        var dp = parts[0].split('-');
        document.getElementById('refreshTs').textContent = 'Daten von: ' + dp[2] + '.' + dp[1] + '. ' + (parts[1]||'');
    }

    // Trigger BTC live + liq updates (if those scripts are loaded)
    if (typeof updateBtcLiveRows === 'function') updateBtcLiveRows();
    if (typeof fetchLiqData === 'function') fetchLiqData();
}

function filterCoins(q) {
    q = q.toUpperCase();
    document.querySelectorAll('.coin-section').forEach(function(el) {
        el.style.display = el.dataset.coin.startsWith(q) ? '' : 'none';
    });
    if (q.length >= 1) {
        var match = document.querySelector('.coin-section[data-coin^="'+q+'"]');
        if (match) match.scrollIntoView({behavior:'smooth',block:'start'});
    }
}

function fetchAndRender() {
    var btn = document.getElementById('refreshBtn');
    var ts = document.getElementById('refreshTs');
    btn.textContent = 'Lade...';
    btn.disabled = true;

    fetch('mtf_scan_data.json?v=' + Date.now())
        .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(function(data) {
            scanData = data.slice(-21);
            renderAll();
            btn.textContent = 'Aktualisieren';
            btn.disabled = false;
        })
        .catch(function(e) {
            ts.textContent = 'Fehler beim Laden: ' + e.message;
            btn.textContent = 'Aktualisieren';
            btn.disabled = false;
        });
}

// Initial load
loadFearGreed();
fetchAndRender();
</script>
<script>
// === BTC LIVE TMO DATA ===
function calcEma(vals, p) {
    let k = 2/(p+1), e = vals[0], res = [e];
    for (let i=1; i<vals.length; i++) { e = vals[i]*k + e*(1-k); res.push(e); }
    return res;
}

function calcTmo(closes, opens, length, calcL, smoothL) {
    length = length || 14; calcL = calcL || 5; smoothL = smoothL || 3;
    let raw = [];
    for (let i=0; i<closes.length; i++) {
        let s = 0;
        for (let j=1; j<=length; j++) {
            if (i-j < 0) continue;
            if (closes[i] > opens[i-j]) s++;
            else if (closes[i] < opens[i-j]) s--;
        }
        raw.push(s);
    }
    let main = calcEma(raw, calcL);
    let signal = calcEma(main, smoothL);
    return {main: main, signal: signal};
}

function calcEmaSimple(vals, period) {
    let k = 2/(period+1), e = vals[0], res = [e];
    for (let i=1; i<vals.length; i++) { e = vals[i]*k + e*(1-k); res.push(e); }
    return res;
}

function aggregateToTf(klines, factor) {
    // Aggregate 1m klines into factor-minute candles
    let result = [];
    for (let i=0; i+factor <= klines.length; i += factor) {
        let slice = klines.slice(i, i+factor);
        let o = parseFloat(slice[0][1]);
        let h = Math.max(...slice.map(k => parseFloat(k[2])));
        let l = Math.min(...slice.map(k => parseFloat(k[3])));
        let c = parseFloat(slice[slice.length-1][4]);
        result.push([slice[0][0], o, h, l, c]);
    }
    return result;
}

async function fetchBtcTf(interval, limit) {
    const url = 'https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval='+interval+'&limit='+limit;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('API error '+resp.status);
    return await resp.json();
}

async function getBtcLiveData() {
    const tfConfigs = [
        {name:'2m', interval:'1m', limit:160, aggregate:2},
        {name:'5m', interval:'5m', limit:80, aggregate:0},
        {name:'15m', interval:'15m', limit:80, aggregate:0},
        {name:'30m', interval:'30m', limit:80, aggregate:0},
        {name:'1h', interval:'1h', limit:80, aggregate:0},
        {name:'4h', interval:'4h', limit:80, aggregate:0}
    ];

    let results = {};

    for (const cfg of tfConfigs) {
        try {
            let raw = await fetchBtcTf(cfg.interval, cfg.limit);
            let candles;
            if (cfg.aggregate > 0) {
                candles = aggregateToTf(raw, cfg.aggregate);
            } else {
                candles = raw.map(k => [k[0], parseFloat(k[1]), parseFloat(k[2]), parseFloat(k[3]), parseFloat(k[4])]);
            }

            // Remove last (open/unconfirmed) candle — only use closed bars
            candles.pop();
            let closes = candles.map(c => c[4]);
            let opens = candles.map(c => c[1]);

            // TMO
            let tmo = calcTmo(closes, opens, 14, 5, 3);
            let mainVal = tmo.main[tmo.main.length-1];
            let sigVal = tmo.signal[tmo.signal.length-1];
            let mainPrev = tmo.main[tmo.main.length-2];
            let sigPrev = tmo.signal[tmo.signal.length-2];

            // EMA50 for trend
            let ema50 = calcEmaSimple(closes, 50);
            let ema50now = ema50[ema50.length-1];
            let ema50prev = ema50[ema50.length-6]; // slope over 5 bars
            let trend = ema50now > ema50prev ? 'BULL' : 'BEAR';
            let aboveEma = closes[closes.length-1] > ema50now;

            // Direction from TMO (ee_dir)
            let eeDir = mainVal > sigVal ? 1 : mainVal < sigVal ? -1 : 0;

            // Composite: trend + above_ema + ee_dir
            let signals = 0;
            signals += trend === 'BULL' ? 1 : -1;
            signals += aboveEma ? 1 : -1;
            signals += eeDir;
            let dir = signals >= 2 ? 'LONG' : signals <= -2 ? 'SHORT' : 'NEUTRAL';

            // Cross detection — only current bar or previous bar (max 2 candles)
            let cross = '';
            let mainPrev2 = tmo.main.length >= 3 ? tmo.main[tmo.main.length-3] : mainPrev;
            let sigPrev2 = tmo.signal.length >= 3 ? tmo.signal[tmo.signal.length-3] : sigPrev;
            // Cross on current bar
            if (mainVal > sigVal && mainPrev <= sigPrev) cross = 'LONG';
            else if (mainVal < sigVal && mainPrev >= sigPrev) cross = 'SHORT';
            // Cross on previous bar (still show for max 2 candles)
            else if (mainPrev > sigPrev && mainPrev2 <= sigPrev2) cross = 'LONG';
            else if (mainPrev < sigPrev && mainPrev2 >= sigPrev2) cross = 'SHORT';

            results[cfg.name] = {main: mainVal, sig: sigVal, dir: dir, cross: cross, bullish: mainVal > sigVal};
        } catch(e) {
            results[cfg.name] = null;
        }
    }
    return results;
}

function renderBtcLiveRow(results) {
    const tfs = ['2m','5m','15m','30m','1h','4h'];
    let r = '<table class="coin-hm" style="margin:4px 0 8px auto;opacity:0.7;width:78%;"><tr><th></th>';
    tfs.forEach(function(tf) { r += '<th>'+tf+'</th>'; });
    r += '</tr><tr><td class="tf-label" style="color:#f7931a;font-weight:700;">BTC &#9889;</td>';
    tfs.forEach(function(tf) {
        const tfData = results[tf];
        if(!tfData) { r += '<td style="background:#1a1a1a;text-align:center;color:#555;padding:4px 2px;border:2px solid #ffffff;">·</td>'; return; }
        const m = tfData.main;
        const bullish = tfData.bullish;
        const cross = tfData.cross;
        const d = tfData.dir;
        const maxVal = 13;
        // TMO bar: Mitte=0, rechts=LONG(+13), links=SHORT(-13)
        // Position des TMO-Werts als % von links (50% = Nulllinie)
        const tmoPct = 50 + (m / maxVal) * 50; // -13=0%, 0=50%, +13=100%
        const dirLetter = d==='LONG'?'L':d==='SHORT'?'S':'·';
        const dirColor = d==='LONG'?'#22c55e':d==='SHORT'?'#ef4444':'#555';
        let tmoSym = cross==='LONG'?'\u25cf':cross==='SHORT'?'\u25cf':bullish?'\u25b2':'\u25bc';
        let tmoColor = cross==='LONG'?'#22c55e':cross==='SHORT'?'#ef4444':bullish?'#22c55e':'#ef4444';
        // Bar from center (50%) to TMO position — color based on POSITION not direction
        const barColor = m >= 0 ? 'rgba(34,197,94,0.4)' : 'rgba(239,68,68,0.4)';
        const barLeft = m >= 0 ? 50 : tmoPct;
        const barWidth = Math.abs(tmoPct - 50);
        const bg = '#1a1a1a';
        // OB/OS lines: -7 = 23% from left, +7 = 77% from left
        const osLine = Math.round(50 - (7/maxVal)*50); // ~23%
        const obLine = Math.round(50 + (7/maxVal)*50); // ~77%
        r += '<td style="background:'+bg+';padding:3px 4px;position:relative;min-width:50px;line-height:1.1;border:2px solid #ffffff;">'
           // TMO value bar from center
           + '<div style="position:absolute;top:0;bottom:0;left:'+barLeft+'%;width:'+barWidth+'%;background:'+barColor+';"></div>'
           // OS line (left, -7)
           + '<div style="position:absolute;top:0;bottom:0;left:'+osLine+'%;width:1px;background:rgba(239,68,68,0.7);"></div>'
           // OB line (right, +7)
           + '<div style="position:absolute;top:0;bottom:0;left:'+obLine+'%;width:1px;background:rgba(239,68,68,0.7);"></div>'
           + '<div style="position:relative;z-index:1;">'
           + '<div style="display:flex;justify-content:space-between;align-items:center;">'
           + '<span style="color:'+dirColor+';font-weight:700;font-size:0.75rem;">'+dirLetter+'</span>'
           + '<span style="color:#8b949e;font-size:0.6rem;">'+m.toFixed(1)+'</span>'
           + '</div>'
           + '<div style="text-align:left;margin-top:1px;">'
           + '<span style="color:'+tmoColor+';font-size:0.7rem;">'+tmoSym+'</span>'
           + '</div>'
           + '</div>'
           + '</td>';
    });
    r += '</tr></table>';
    return r;
}

async function updateBtcLiveRows() {
    try {
        const data = await getBtcLiveData();
        const html = renderBtcLiveRow(data);
        document.querySelectorAll('.btc-live-row').forEach(function(el) {
            el.innerHTML = html;
        });
    } catch(e) {
        // Fallback: show stale scan data
        const btcScans = scanData.filter(function(s) { return (s.coins||{})['BTC']; });
        if(!btcScans.length) return;
        const latest = btcScans[btcScans.length-1];
        const btcData = latest.coins['BTC'];
        const tfs2 = ['2m','5m','15m','30m','1h','4h'];
        let r = '<table class="coin-hm" style="margin:4px 0 8px auto;opacity:0.7;width:78%;"><tr><th></th>';
        tfs2.forEach(function(tf) { r += '<th>'+tf+'</th>'; });
        r += '</tr><tr><td class="tf-label" style="color:#f7931a;font-weight:700;">BTC</td>';
        tfs2.forEach(function(tf) {
            const tfData = btcData[tf];
            if(!tfData) { r += '<td style="background:#1a1a1a;text-align:center;color:#555;padding:4px 2px;border:2px solid #ffffff;">·</td>'; return; }
            const m = tfData.ee_main||0;
            const d = tfData.dir||'NEUTRAL';
            const dirLetter = d==='LONG'?'L':d==='SHORT'?'S':'·';
            const dirColor = d==='LONG'?'#22c55e':d==='SHORT'?'#ef4444':'#555';
            r += '<td style="background:#1a1a1a;padding:3px 4px;text-align:center;border:2px solid #ffffff;">'
               + '<span style="color:'+dirColor+';font-weight:700;font-size:0.75rem;">'+dirLetter+'</span>'
               + '</td>';
        });
        r += '</tr></table>';
        document.querySelectorAll('.btc-live-row').forEach(function(el) {
            el.innerHTML = r;
        });
    }
}

// Initial load + auto-refresh every 60s
updateBtcLiveRows();
setInterval(updateBtcLiveRows, 60000);
</script>
<script>
// === LIQUIDATION LIVE INDICATORS ===
(function() {
    function fetchLiqData() {
        fetch('liquidations_live.json?v=' + Date.now())
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
                if (!data || !data.coins) return;
                // Remove old indicators
                document.querySelectorAll('.liq-badge').forEach(function(el) { el.remove(); });
                // For each coin section, check liquidation data
                document.querySelectorAll('.coin-section').forEach(function(el) {
                    var coin = el.dataset.coin;
                    if (!coin) return;
                    var coinData = data.coins[coin];
                    if (!coinData || !coinData.recent_15m) return;
                    var r = coinData.recent_15m;
                    if (r.long_count === 0 && r.short_count === 0) return;
                    var nameEl = el.querySelector('.coin-name');
                    if (!nameEl) return;
                    var badge = document.createElement('span');
                    badge.className = 'liq-badge';
                    badge.style.cssText = 'font-size:0.8rem;margin-left:8px;font-weight:600;';
                    // More short liqs = bullish (green up), more long liqs = bearish (red down)
                    if (r.short_count > r.long_count) {
                        var vol = r.short_vol >= 1000000 ? (r.short_vol/1000000).toFixed(1)+'M' : Math.round(r.short_vol/1000)+'K';
                        badge.innerHTML = '<span style="color:#22c55e;">&#x25B2; $' + vol + '</span>';
                        badge.title = r.short_count + ' short liqs ($' + vol + ') in 15min — bullish';
                    } else if (r.long_count > r.short_count) {
                        var vol = r.long_vol >= 1000000 ? (r.long_vol/1000000).toFixed(1)+'M' : Math.round(r.long_vol/1000)+'K';
                        badge.innerHTML = '<span style="color:#ef4444;">&#x25BC; $' + vol + '</span>';
                        badge.title = r.long_count + ' long liqs ($' + vol + ') in 15min — bearish';
                    } else {
                        var vol = (r.long_vol + r.short_vol);
                        vol = vol >= 1000000 ? (vol/1000000).toFixed(1)+'M' : Math.round(vol/1000)+'K';
                        badge.innerHTML = '<span style="color:#f59e0b;">&#x25C6; $' + vol + '</span>';
                        badge.title = 'Equal long/short liqs in 15min';
                    }
                    nameEl.appendChild(badge);
                });
            })
            .catch(function() {});
    }
    // Initial fetch + auto-refresh every 30s
    fetchLiqData();
    setInterval(fetchLiqData, 30000);
})();
</script>
