<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<title>Laufende Trades</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;padding:10px}
h1{color:#58a6ff;text-align:center;font-size:1.3rem;margin-bottom:5px}
.nav{display:flex;justify-content:space-between;padding:0 10px;margin-bottom:10px}
.nav a{color:#4a7a9b;text-decoration:none;font-size:0.8rem;padding:4px 12px;border:1px solid #21262d;border-radius:4px}
.sub{text-align:center;color:#484f58;font-size:0.75rem;margin-bottom:10px}
.trade-card{background:#161b22;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #21262d}
.trade-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.trade-coin{font-size:1.3rem;font-weight:700;color:#58a6ff}
.trade-dir{font-size:0.8rem;padding:3px 10px;border-radius:4px;font-weight:600}
.dir-long{background:rgba(34,197,94,0.2);color:#22c55e}
.dir-short{background:rgba(239,68,68,0.2);color:#ef4444}
.trade-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.trade-item{text-align:center;padding:6px;background:#0d1117;border-radius:6px}
.trade-item .label{font-size:0.65rem;color:#8b949e;text-transform:uppercase}
.trade-item .val{font-size:0.95rem;font-weight:700;margin-top:2px}
.green{color:#22c55e}
.red{color:#ef4444}
.orange{color:#ff9800}
.liq-bar{height:6px;background:#21262d;border-radius:3px;margin-top:8px;overflow:hidden;position:relative}
.liq-fill{height:100%;border-radius:3px;transition:width 0.3s}
.liq-label{font-size:0.65rem;color:#8b949e;margin-top:3px;display:flex;justify-content:space-between}
.total-section{background:#161b22;border-radius:10px;padding:14px;border:1px solid #21262d;margin-bottom:10px}
.total-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center}
.total-val{font-size:1.5rem;font-weight:700}
.btn-refresh{width:100%;padding:10px;background:#161b22;color:#58a6ff;border:1px solid #21262d;border-radius:6px;font-size:0.85rem;cursor:pointer;margin-bottom:10px}
</style>
</head>
<body>
<h1>Laufende Trades</h1>
<div style="display:flex;justify-content:space-between;align-items:center;padding:0 10px;margin-bottom:10px"><a href="cockpit.html" style="color:#4a7a9b;text-decoration:none;font-size:0.8rem;padding:4px 12px;border:1px solid #21262d;border-radius:4px">← Cockpit</a><a href="index.html" style="color:#58a6ff;text-decoration:none;font-size:0.8rem;padding:4px 12px;border:1px solid #21262d;border-radius:4px">Dashboard</a><a href="kalkulator.html" style="color:#4a7a9b;text-decoration:none;font-size:0.8rem;padding:4px 12px;border:1px solid #21262d;border-radius:4px">Kalkulator →</a></div>
<div class="sub" id="lastUpdate">Laden...</div>

<button class="btn-refresh" onclick="loadAll()">Aktualisieren</button>

<div class="total-section">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;text-align:center">
  <div><div class="label" style="font-size:0.7rem;color:#8b949e;">GESAMT PNL (OPEN)</div><div class="total-val" id="totalPnlOpen">—</div></div>
  <div><div class="label" style="font-size:0.7rem;color:#8b949e;">GESAMT PNL (REALIZED)</div><div class="total-val" id="totalPnlRealized">—</div></div>
  <div><div class="label" style="font-size:0.7rem;color:#8b949e;">MARGIN IN TRADES</div><div class="total-val" id="totalMargin" style="color:#3b9eff">—</div></div>
  <div><div class="label" style="font-size:0.7rem;color:#8b949e;">POSITIONEN</div><div class="total-val" id="totalPos">—</div></div>
</div>
</div>

<div id="trades"></div>

<div class="total-section">
<div style="font-size:0.85rem;font-weight:600;color:#58a6ff;margin-bottom:8px;">Abgeschlossen (seit Auszahlung #5, 12.05.)</div>
<div style="overflow-x:auto;">
<table style="width:100%;border-collapse:collapse;font-size:0.75rem;">
<tr style="color:#8b949e;border-bottom:1px solid #21262d;">
  <th style="text-align:left;padding:4px;">#</th>
  <th style="text-align:left;padding:4px;">Coin</th>
  <th style="text-align:center;padding:4px;">L/S</th>
  <th style="text-align:right;padding:4px;">PnL</th>
  <th style="text-align:left;padding:4px;">Signal</th>
</tr>
<tbody id="closedTrades"></tbody>
<tr style="border-top:2px solid #21262d;">
  <td colspan="3" style="padding:6px;font-weight:700;">SUMME</td>
  <td style="text-align:right;padding:6px;font-weight:700;" id="closedSum">—</td>
  <td></td>
</tr>
</table>
</div>
</div>

<div style="text-align:center;margin-top:10px;color:#484f58;font-size:0.7rem;"><a href="cockpit.html" style="color:#484f58;text-decoration:none;">← Cockpit</a></div>

<script>
const positions = [
  {coin:'SEI', sym:'SEIUSDT', dir:'LONG', lev:10, entry:0.06441, size:145664, liq:0.05564, exchange:'Bitget', realized:-392.48, margin_fix:1335},
  {coin:'LTC', sym:'LTCUSDT', dir:'LONG', lev:10, entry:57.69, size:241.5, liq:50.84, exchange:'Bitget', realized:-808.84, margin_fix:1752},
  {coin:'XLM', sym:'XLMUSDT', dir:'LONG', lev:9, entry:0.17340, size:35537, liq:0.13522, exchange:'Phemex', realized:-331.44, margin_fix:1665},
  {coin:'SOL', sym:'SOLUSDT', dir:'SHORT', lev:70, entry:85.173, size:238.19, liq:88.024, exchange:'BingX', realized:-10.14},
];

async function getPrice(sym) {
  try {
    const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=' + sym);
    const d = await r.json();
    return parseFloat(d.price);
  } catch(e) { return null; }
}

function liqColor(pct) {
  if (pct > 10) return '#22c55e';
  if (pct > 5) return '#ff9800';
  return '#ef4444';
}

async function loadAll() {
  document.getElementById('lastUpdate').textContent = 'Aktualisiere...';
  let html = '';
  let totalPnlOpen = 0;
  let totalPnlRealized = 0;
  let totalMargin = 0;
  let count = 0;

  for (const p of positions) {
    const price = await getPrice(p.sym);
    if (!price) continue;
    count++;

    const unrealized = p.dir === 'LONG' ? (price - p.entry) * p.size : (p.entry - price) * p.size;
    const realized = p.realized || 0;
    const pnl = unrealized + realized;
    const margin = p.margin_fix || (p.size * p.entry / p.lev);
    const roi = pnl / margin * 100;
    const liqDist = p.dir === 'LONG' ? (price - p.liq) / price * 100 : (p.liq - price) / price * 100;
    const entryDist = ((price - p.entry) / p.entry * 100);
    totalPnlOpen += unrealized;
    totalPnlRealized += realized;
    totalMargin += margin;

    const pnlCls = pnl >= 0 ? 'green' : 'red';
    const dirCls = p.dir === 'LONG' ? 'dir-long' : 'dir-short';
    const liqW = Math.min(100, Math.max(5, 100 - liqDist * 5));
    const liqC = liqColor(liqDist);

    const decimals = p.entry < 1 ? 5 : 2;

    html += '<div class="trade-card">';
    html += '<div class="trade-header"><div class="trade-coin">' + p.coin + '</div><span class="trade-dir ' + dirCls + '">' + p.dir + ' ' + p.lev + 'x · ' + p.exchange + '</span></div>';
    html += '<div class="trade-grid">';
    const realCls = realized >= 0 ? 'green' : 'red';
    html += '<div class="trade-item"><div class="label">PnL (open)</div><div class="val ' + pnlCls + '">' + (unrealized>=0?'+':'') + '$' + unrealized.toFixed(0) + '</div></div>';
    html += '<div class="trade-item"><div class="label">PnL (realized)</div><div class="val ' + realCls + '">' + (realized>=0?'+':'') + '$' + realized.toFixed(0) + '</div></div>';
    html += '<div class="trade-item"><div class="label">ROI</div><div class="val ' + pnlCls + '">' + (roi>=0?'+':'') + roi.toFixed(1) + '%</div></div>';
    html += '<div class="trade-item"><div class="label">Margin</div><div class="val" style="color:#3b9eff">$' + margin.toFixed(0) + '</div></div>';
    html += '<div class="trade-item"><div class="label">Preis</div><div class="val">$' + price.toFixed(decimals) + '</div></div>';
    html += '<div class="trade-item"><div class="label">Entry</div><div class="val">$' + p.entry.toFixed(decimals) + '</div></div>';
    html += '<div class="trade-item"><div class="label">Liq</div><div class="val orange">$' + p.liq.toFixed(decimals) + '</div></div>';
    html += '<div class="trade-item"><div class="label">vs Entry</div><div class="val ' + (entryDist>=0?'green':'red') + '">' + (entryDist>=0?'+':'') + entryDist.toFixed(1) + '%</div></div>';
    html += '</div>';
    html += '</div>';
  }

  document.getElementById('trades').innerHTML = html;
  document.getElementById('totalPnlOpen').innerHTML = '<span class="' + (totalPnlOpen>=0?'green':'red') + '">' + (totalPnlOpen>=0?'+':'') + '$' + totalPnlOpen.toFixed(0) + '</span>';
  document.getElementById('totalPnlRealized').innerHTML = '<span class="' + (totalPnlRealized>=0?'green':'red') + '">' + (totalPnlRealized>=0?'+':'') + '$' + totalPnlRealized.toFixed(0) + '</span>';
  document.getElementById('totalMargin').textContent = '$' + totalMargin.toFixed(0);
  document.getElementById('totalPos').textContent = count;
  document.getElementById('lastUpdate').textContent = 'Stand: ' + new Date().toLocaleTimeString('de');
}

loadAll();
setInterval(loadAll, 30000);

// Load closed trades since last payout (#82+)
async function loadClosed() {
  try {
    const r = await fetch('trades_data.js?t=' + Date.now());
    const text = await r.text();
    const s = text.indexOf('{');
    let bc = 0, end = s;
    for (let i = s; i < text.length; i++) {
      if (text[i] === '{') bc++;
      else if (text[i] === '}') bc--;
      if (bc === 0) { end = i + 1; break; }
    }
    const data = JSON.parse(text.substring(s, end));
    const trades = data.trades.filter(t => t.abgeschl === 'j' && t.nr >= 82 && t.pnl !== null);

    let html = '';
    let sum = 0;
    trades.forEach(t => {
      const pnl = t.net_pnl !== null ? t.net_pnl : t.pnl;
      const p = typeof pnl === 'string' ? parseFloat(pnl.replace(',','.')) : pnl;
      sum += p;
      const cls = p >= 0 ? 'green' : 'red';
      html += '<tr><td style="padding:3px 4px;">' + t.nr + '</td>';
      html += '<td style="padding:3px 4px;">' + t.coin + '</td>';
      html += '<td style="text-align:center;padding:3px 4px;">' + (t.richtung||'').toUpperCase() + '</td>';
      html += '<td style="text-align:right;padding:3px 4px;" class="' + cls + '">' + (p>=0?'+':'') + '$' + p.toFixed(0) + '</td>';
      html += '<td style="padding:3px 4px;color:#8b949e;">' + (t.signal||'') + '</td></tr>';
    });

    document.getElementById('closedTrades').innerHTML = html;
    const sumCls = sum >= 0 ? 'green' : 'red';
    document.getElementById('closedSum').innerHTML = '<span class="' + sumCls + '">' + (sum>=0?'+':'') + '$' + sum.toFixed(0) + '</span>';
  } catch(e) {}
}
loadClosed();
</script>
</body>
</html>
