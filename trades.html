<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOCH Trading — Trade Log</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d0d;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  header{background:#111;border-bottom:1px solid #222;padding:16px 20px;display:flex;align-items:center;gap:12px}
  header a{color:#888;text-decoration:none;font-size:13px;transition:color .2s}
  header a:hover{color:#fff}
  header h1{font-size:18px;font-weight:600;color:#fff}
  header .sep{color:#333}
  .controls{padding:14px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:#111;border-bottom:1px solid #1a1a1a;position:sticky;top:0;z-index:10}
  .controls input,.controls select{background:#1a1a1a;border:1px solid #2a2a2a;color:#e0e0e0;padding:8px 12px;border-radius:8px;font-size:13px;outline:none;transition:border-color .2s}
  .controls input:focus,.controls select:focus{border-color:#3a7bd5}
  .controls input{flex:1;min-width:160px;max-width:260px}
  .stats-bar{margin-left:auto;display:flex;gap:16px;font-size:12px;color:#666;flex-wrap:wrap}
  .stats-bar b{color:#e0e0e0;font-weight:600}
  .container{padding:16px 20px}
  table{width:100%;border-collapse:collapse}
  th{background:#131313;color:#666;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;text-align:left;border-bottom:1px solid #222;position:sticky;top:57px;cursor:pointer;user-select:none;white-space:nowrap;transition:color .2s}
  th:hover{color:#ccc}
  th.asc::after{content:' ↑'}
  th.desc::after{content:' ↓'}
  th.asc,th.desc{color:#3a7bd5}
  td{padding:9px 12px;border-bottom:1px solid #181818;font-size:13px;white-space:nowrap}
  tr:hover td{background:#161616}
  .badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
  .long{background:rgba(0,200,100,.12);color:#00c864}
  .short{background:rgba(255,60,60,.12);color:#ff5555}
  .pos{color:#00c864}
  .neg{color:#ff5555}
  .coin{background:#1a2535;color:#7ab8ff;padding:2px 8px;border-radius:4px;font-weight:700;font-size:12px}
  .muted{color:#555}
  .notiz{color:#888;font-size:11px;font-style:italic;max-width:160px;overflow:hidden;text-overflow:ellipsis}
  .cards{display:none}
  .card{background:#161616;border:1px solid #1e1e1e;border-radius:12px;padding:14px;margin-bottom:10px}
  .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .card-left{display:flex;align-items:center;gap:8px}
  .card-pnl{font-size:20px;font-weight:700}
  .card-roi{font-size:12px;opacity:.7}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .grid1{display:grid;grid-template-columns:1fr;gap:6px;margin-top:6px}
  .ci{background:#1a1a1a;border-radius:6px;padding:7px 10px}
  .cl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
  .cv{font-size:13px;font-weight:500}
  .cv.notiz-cv{font-size:12px;color:#888;font-style:italic;font-weight:400}
  .empty{text-align:center;padding:60px 20px;color:#444;font-size:15px}
  @media(max-width:768px){
    table{display:none}
    .cards{display:block}
    .controls{padding:12px 16px;top:0}
    .stats-bar{margin-left:0;width:100%}
    .container{padding:12px 16px}
  }
</style>
</head>
<body>
<header>
  <a href="index.html">← Dashboard</a>
  <span class="sep">|</span>
  <h1>Trade Log</h1>
  <a href="stats.html" style="margin-left:auto;color:#4a7a9b;text-decoration:none;font-size:.8rem;padding:5px 14px;border:1px solid #2a2a2a;border-radius:20px;transition:all .2s" onmouseover="this.style.color='#00c8ff';this.style.borderColor='#00c8ff55'" onmouseout="this.style.color='#4a7a9b';this.style.borderColor='#2a2a2a'">Trade-Statistik →</a>
  <a href="auszahlung.html" style="color:#f59e0b;text-decoration:none;font-size:.8rem;padding:5px 14px;border:1px solid #f59e0b55;border-radius:20px;transition:all .2s" onmouseover="this.style.background='#f59e0b22'" onmouseout="this.style.background='transparent'">Auszahlung</a>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="🔍 Coin, Signal, Account…" oninput="render()">
  <select id="fDir" onchange="render()">
    <option value="">Alle Richtungen</option>
    <option value="L">Long</option>
    <option value="S">Short</option>
  </select>
  <select id="fRes" onchange="render()">
    <option value="">Alle Ergebnisse</option>
    <option value="win">Gewinn</option>
    <option value="loss">Verlust</option>
  </select>
  <select id="fSig" onchange="render()">
    <option value="">Alle Signalgeber</option>
  </select>
  <div class="stats-bar">
    <div>Trades: <b id="cnt">0</b></div>
    <div>Net PNL: <b id="pnlTotal">—</b></div>
    <div>Win Rate: <b id="wr">—</b></div>
  </div>
</div>
<div class="container">
  <table id="tbl">
    <thead><tr>
      <th data-k="nr">#</th>
      <th data-k="datum">Datum</th>
      <th data-k="coin">Coin</th>
      <th data-k="richtung">Dir</th>
      <th data-k="signal">Signal</th>
      <th data-k="account">Account</th>
      <th data-k="einsatz">Einsatz</th>
      <th data-k="hebel">Hebel</th>
      <th data-k="entry">Entry</th>
      <th data-k="ausstieg">Ausstieg</th>
      <th data-k="dauer">Dauer</th>
      <th data-k="roi">ROI %</th>
      <th data-k="pnl">PNL</th>
      <th data-k="net_pnl">Net PNL</th>
      <th data-k="notiz">Notiz</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="cards" id="cardBox"></div>
  <div class="empty" id="empty" style="display:none">Keine Trades gefunden</div>
</div>
<script>document.write('<scr'+'ipt src="trades_data.js?v='+Date.now()+'"><\/scr'+'ipt>');</script>
<script>
function _n(v){if(v===null||v===undefined||v==='')return null;const n=parseFloat(String(v).replace(',','.'));return isNaN(n)?null:n;}
const T=TRADE_DATA.trades.map(t=>({...t,pnl:_n(t.pnl),roi:_n(t.roi),net_pnl:_n(t.net_pnl)}));
let sk='nr',sd=-1;
const sigs=[...new Set(T.map(t=>t.signal).filter(Boolean))].sort();
const sel=document.getElementById('fSig');
sigs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
document.querySelectorAll('th[data-k]').forEach(th=>{
  th.onclick=()=>{const k=th.dataset.k;if(sk===k)sd*=-1;else{sk=k;sd=-1;}render();};
});
function pSign(v){if(v===null||v===undefined||v==='')return '—';const n=parseFloat(String(v).replace(',','.'));if(isNaN(n))return '—';return(n>=0?'+':'')+n.toFixed(2);}
function cls(v){if(v===null||v===undefined||v==='')return '';const n=parseFloat(String(v).replace(',','.'));if(isNaN(n))return '';return n>=0?'pos':'neg';}
function dir(r){const u=(r||'').toUpperCase();if(u==='L'||u==='LONG')return 'L';if(u==='S'||u==='SHORT')return 'S';return null;}
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const fDir=document.getElementById('fDir').value;
  const fRes=document.getElementById('fRes').value;
  const fSig=document.getElementById('fSig').value;
  let f=T.filter(t=>{
    if(q&&!(t.coin+t.signal+t.account+t.datum+(t.notiz||'')).toLowerCase().includes(q))return false;
    if(fDir&&dir(t.richtung)!==fDir)return false;
    if(fRes==='win'&&(t.pnl===null||t.pnl<0))return false;
    if(fRes==='loss'&&(t.pnl===null||t.pnl>=0))return false;
    if(fSig&&t.signal!==fSig)return false;
    return true;
  });
  f.sort((a,b)=>{
    let av=a[sk],bv=b[sk];
    if(sk==='nr'||sk==='roi'||sk==='pnl'||sk==='net_pnl'||sk==='hebel'||sk==='einsatz'){
      av=parseFloat(av)||0;bv=parseFloat(bv)||0;
      return sd*(bv-av);
    }
    if(av===null||av==='')av=sd>0?'zzz':'';
    if(bv===null||bv==='')bv=sd>0?'zzz':'';
    if(typeof av==='string')return sd*av.localeCompare(bv);
    return sd*(bv-av);
  });
  const totalNet=f.reduce((s,t)=>s+(t.net_pnl||t.pnl||0),0);
  const wins=f.filter(t=>t.pnl!==null&&t.pnl>0).length;
  const closed=f.filter(t=>t.pnl!==null).length;
  document.getElementById('cnt').textContent=f.length;
  const pe=document.getElementById('pnlTotal');
  pe.textContent=(totalNet>=0?'+':'')+totalNet.toFixed(2)+' $';
  pe.style.color=totalNet>=0?'#00c864':'#ff5555';
  document.getElementById('wr').textContent=closed?Math.round(wins/closed*100)+'%':'—';
  document.querySelectorAll('th[data-k]').forEach(th=>{th.className=th.dataset.k===sk?(sd===-1?'desc':'asc'):'';});
  document.getElementById('tbody').innerHTML=f.map(t=>`
    <tr>
      <td class="muted">${t.nr}</td>
      <td>${t.datum}</td>
      <td><span class="coin">${t.coin}</span></td>
      <td><span class="badge ${dir(t.richtung)==='L'?'long':dir(t.richtung)==='S'?'short':''}">${dir(t.richtung)==='L'?'Long':dir(t.richtung)==='S'?'Short':'—'}</span></td>
      <td>${t.signal||'—'}</td>
      <td class="muted">${t.account||'—'}</td>
      <td>${t.einsatz?t.einsatz+' $':'—'}</td>
      <td>${t.hebel?t.hebel+'x':'—'}</td>
      <td class="muted">${t.entry||'—'}</td>
      <td class="muted">${t.ausstieg||'—'}</td>
      <td class="muted">${t.dauer||'—'}</td>
      <td class="${cls(t.roi)}">${t.roi!=null&&t.roi!==''?pSign(t.roi)+'%':'—'}</td>
      <td class="${cls(t.pnl)}">${t.pnl!=null&&t.pnl!==''?pSign(t.pnl):'—'}</td>
      <td class="${cls(t.net_pnl)}" style="font-weight:600">${t.net_pnl!=null&&t.net_pnl!==''?pSign(t.net_pnl):'—'}</td>
      <td class="notiz">${t.notiz||''}</td>
    </tr>`).join('');
  document.getElementById('cardBox').innerHTML=f.map(t=>`
    <div class="card">
      <div class="card-top">
        <div class="card-left">
          <span class="coin">${t.coin}</span>
          <span class="badge ${dir(t.richtung)==='L'?'long':dir(t.richtung)==='S'?'short':''}">${dir(t.richtung)==='L'?'Long':dir(t.richtung)==='S'?'Short':'—'}</span>
          <span class="muted" style="font-size:11px">#${t.nr}</span>
        </div>
        <div>
          <div class="card-pnl ${cls(t.net_pnl||t.pnl)}">${t.net_pnl!=null&&t.net_pnl!==''?pSign(t.net_pnl)+' $':t.pnl!=null&&t.pnl!==''?pSign(t.pnl)+' $':'—'}</div>
          <div class="card-roi ${cls(t.roi)}">${t.roi!=null&&t.roi!==''?pSign(t.roi)+'%':''}</div>
        </div>
      </div>
      <div class="grid2">
        <div class="ci"><div class="cl">Datum</div><div class="cv">${t.datum}</div></div>
        <div class="ci"><div class="cl">Signal</div><div class="cv">${t.signal||'—'}</div></div>
        <div class="ci"><div class="cl">Account</div><div class="cv">${t.account||'—'}</div></div>
        <div class="ci"><div class="cl">Dauer</div><div class="cv">${t.dauer||'—'}</div></div>
        <div class="ci"><div class="cl">Entry</div><div class="cv">${t.entry||'—'}</div></div>
        <div class="ci"><div class="cl">Ausstieg</div><div class="cv">${t.ausstieg||'—'}</div></div>
        <div class="ci"><div class="cl">Einsatz</div><div class="cv">${t.einsatz?t.einsatz+' $':'—'}</div></div>
        <div class="ci"><div class="cl">Hebel</div><div class="cv">${t.hebel?t.hebel+'x':'—'}</div></div>
      </div>
      ${t.notiz?`<div class="grid1"><div class="ci"><div class="cl">Notiz</div><div class="cv notiz-cv">${t.notiz}</div></div></div>`:''}
    </div>`).join('');
  document.getElementById('empty').style.display=f.length?'none':'block';
}
render();
</script>
</body>
</html>
